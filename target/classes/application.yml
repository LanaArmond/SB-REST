spring:
  application:
    name: SB-REST

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rest_sb?useTimezone=true&serverTimezone=UTC
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

logging:
  level:
    # br.com.javastudies.sbrest: DEBUG
    root: INFO

spring-doc:
  paths-to-match: /api/**/**
  swagger-ui:
    use-root-path: true